# Bargain Hunter — tunable parameters. Edit and push; no code change needed.

run:
  dry_run: false
  max_alerts_per_user_per_day: 10
  timezone: "Australia/Sydney"      # AET/AEDT — used for daily caps, quiet hours, and midnight boundary
  quiet_hours_start: "22:00"        # AEST — no alerts after 10pm
  quiet_hours_end: "07:00"          # AEST — no alerts before 7am (overnight window)

sources:
  ozbargain:
    enabled: true
    feed_url: "https://www.ozbargain.com.au/deals/feed"
  camelcamelcamel:
    enabled: true
    feed_url: "https://au.camelcamelcamel.com/top_drops/feed"

scoring:
  window_minutes: 15               # 15-min window: accurate current momentum, 2-run detection
  hot:
    # V1 gate: 5 votes in 15 min = 20 votes/h — same velocity bar, shorter window
    min_votes_gain_per_window: 5   # net votes gained in window (V1)
    early_burst_age_hours: 2       # age threshold for early-burst detection (H)
    # V2=30: p90 of votes_pos in observed data is 44; 30 targets top ~25%
    early_burst_min_votes: 30      # early-burst absolute vote count (V2)
    velocity_top_percent: 10       # top P% of active deals enter candidate pool
    # threshold=1.5: calibrated on 143 observed deals → ~7% fire rate (10/143)
    hot_threshold: 1.5             # weighted heat score threshold
    neg_vote_penalty_weight: 0.5   # negative-vote penalty weight
    age_penalty_half_life_hours: 12  # age decay half-life
    min_votes_for_percentile: 10   # deals below this vote count skip the percentile gate
    # Data finding: deals with <10 votes but high comment velocity scored 12.4 (false positives).
    # Floor gates out these noise cases before scoring.
    min_votes_to_candidate: 10     # minimum votes to enter hot candidate pool (data-calibrated)
    # Data finding: comment velocity at 0.25 weight dominated scores (e.g. 10+ pts from comments alone).
    # 0.1 still rewards comment engagement without letting it override vote signal.
    comment_velocity_weight: 0.1   # comment velocity weight in scoring formula (reduced to reduce noise)
    # Quality gate (data-backed, 2026-06-24/25 observations):
    # Deals with votes < quality_high_votes_threshold MUST have discount >= quality_min_discount_pct.
    # Eliminates promo/food/membership deals (22-38 votes, no extractable discount)
    # while keeping genuine product discounts (e.g. 13 votes, 50% off).
    quality_min_discount_pct: 20.0  # deals below threshold need ≥20% discount
    quality_high_votes_threshold: 40  # deals with ≥40 votes skip the discount requirement
  watch:
    min_votes: 15                  # minimum positive votes after keyword match (raised to 15)
    min_discount_percent: 15       # discount threshold when no votes available (e.g. CCC) — raised to 15%
    max_deal_age_hours: 36         # skip deals older than 36h to avoid backlog filling daily cap

dedup:
  lookback_days: 7                 # read recent Sent Log window for local dedup
  max_realerts_per_deal: 0         # 0 = no re-alerts; each deal notifies each subscriber once
  significant_price_drop_percent: 5.0
  heat_band_size_votes: 50

cold_start:
  ignore_deals_older_than_hours: 6  # on first sight, skip deals older than this

alerting:
  min_consecutive_failures: 3      # send maintainer alert only after this many consecutive failures
  cooldown_hours: 1.0              # silence period after an alert fires

# ---------------------------------------------------------------------------
# Strategy guide collection (strategy_hunter). GitHub Actions harvests daily;
# use the local extraction skill (strategy-extract) to distil into guides.
# ---------------------------------------------------------------------------
strategy:
  enabled: true
  min_relevance: 1                 # minimum money-saving signal words in title+body to keep a post
  request_delay_seconds: 1.0       # polite crawl delay when fetching thread bodies
  retention_days: 60               # raw corpus retention in days; pruned on each run (0 = keep forever)
  alert_on_failure: true           # email maintainer if a collection run errors or harvests nothing
  sources:
    reddit:
      enabled: true
      subreddits: ["AusFinance", "AusFrugal", "fiaustralia"]
      listing: "hot"              # hot | new | top
      limit: 25
    ozbargain_forum:
      enabled: true
      board_urls:
        - "https://www.ozbargain.com.au/forum/1341"   # Find Me A Bargain
        - "https://www.ozbargain.com.au/forum/38183"  # Financial
      max_threads_per_board: 25
      fetch_body: true
    ozbargain_comments:
      enabled: true
      feed_url: "https://www.ozbargain.com.au/deals/feed"
      min_comments: 10             # only dig into deals with >= this many comments (discussion-rich)
      max_deals: 15                # max deal node pages to scrape per run
    whirlpool:
      enabled: true
      board_urls:
        - "https://forums.whirlpool.net.au/forum/153" # Shopping
        - "https://forums.whirlpool.net.au/forum/150" # Finance
        - "https://forums.whirlpool.net.au/forum/149" # Travel
      max_threads_per_board: 25
      fetch_body: true
