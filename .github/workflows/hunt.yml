name: bargain-hunter

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes; actual trigger ~5-15 min due to queue
  workflow_dispatch:          # manual trigger for testing

# Prevent overlapping runs if a prior one is still in progress
concurrency:
  group: bargain-hunter-run
  cancel-in-progress: false   # don't cancel; let in-flight run finish

permissions:
  contents: write             # needed only for the daily state commit

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . --quiet

      # Restore hot state (velocity snapshots) from previous run.
      # best-effort: missing cache means cold-start logic kicks in.
      - name: Restore deal state (hot cache)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/deals_state.json
            data/alert_state.json
            data/observations
          key: deals-state-${{ github.run_id }}
          restore-keys: deals-state-

      - name: Run bargain hunter
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SUBSCRIBERS_DB_ID: ${{ secrets.NOTION_SUBSCRIBERS_DB_ID }}
          NOTION_SENT_LOG_DB_ID: ${{ secrets.NOTION_SENT_LOG_DB_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          MAINTAINER_EMAIL: ${{ secrets.MAINTAINER_EMAIL }}
          FEEDBACK_BASE_URL: ${{ vars.FEEDBACK_BASE_URL }}   # public worker URL (repo variable)
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}    # dead-man's-switch ping
        run: python -m bargain_hunter.main

      # Save updated state (hot cache) for the next run.
      - name: Save deal state (hot cache)
        if: always()    # save even if main step failed so we don't lose snapshots
        uses: actions/cache/save@v4
        with:
          path: |
            data/deals_state.json
            data/alert_state.json
            data/observations
          key: deals-state-${{ github.run_id }}

      # Once per AET day: commit deals_state.json as a calibration seed / disaster-recovery baseline.
      - name: Daily state commit (seed / calibration)
        if: success()
        env:
          TZ: Australia/Sydney
        run: |
          today=$(date +%Y-%m-%d)
          last=$(git log -1 --format=%cd --date=format-local:%Y-%m-%d -- data/deals_state.json 2>/dev/null || true)
          # Commit at most once per AET day.
          if [ "$last" != "$today" ] && [ -f data/deals_state.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/deals_state.json
            git diff --staged --quiet || git commit -m "chore: daily state snapshot [skip ci]"
            git push
          fi

      # Every successful run: commit new observation rows so calibration data accumulates
      # continuously, not just once per day. Observations are the feature log used to tune
      # thresholds; missing a run means a gap in the training set.
      - name: Commit observations (calibration log)
        if: success()
        run: |
          if [ ! -d data/observations ] || [ -z "$(ls data/observations/*.jsonl 2>/dev/null)" ]; then
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/observations/
          git diff --staged --quiet || git commit -m "chore: observations [skip ci]"
          git push
