name: terraform-feedback-worker

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "feedback-worker/src/**"
      - "portal-worker/src/**"
      - "portal-worker/package.json"
      - "frontend/wrangler.toml"
      - ".github/workflows/terraform-feedback.yml"
  pull_request:
    paths:
      - "terraform/**"
      - "feedback-worker/src/**"
      - "portal-worker/src/**"
      - "portal-worker/package.json"
      - "frontend/wrangler.toml"
      - ".github/workflows/terraform-feedback.yml"
  workflow_dispatch:

# Serialize runs so two applies never touch the state at once (our lock strategy).
concurrency:
  group: terraform-feedback
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
      # R2 state backend (S3-compatible) credentials
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      # Worker resource inputs — feedback worker
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_notion_token: ${{ secrets.NOTION_TOKEN }}
      TF_VAR_feedback_hmac_secret: ${{ secrets.FEEDBACK_HMAC_SECRET }}
      TF_VAR_cloudflare_account_id: d4f60d0edf9986427ad8e357eba453b6
      TF_VAR_feedback_db_id: 389a2a0bfd0481328e01c06175dae735
      # Worker resource inputs — portal API worker
      TF_VAR_subscribers_db_id: ${{ secrets.TF_VAR_SUBSCRIBERS_DB_ID }}
      TF_VAR_resend_api_key: ${{ secrets.TF_VAR_RESEND_API_KEY }}
      TF_VAR_frontend_url: https://bargainhunter.app,https://bargain-hunter.pages.dev
      TF_VAR_owner_email: ${{ secrets.TF_VAR_OWNER_EMAIL }}
      TF_VAR_pages_project_name: bargain-hunter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portal-worker/package-lock.json

      - name: Build portal worker
        working-directory: portal-worker
        run: |
          npm ci
          npx wrangler deploy --dry-run --outdir dist

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Write R2 backend config
        run: |
          printf 'bucket    = "bargain-hunter-tfstate"\nendpoints = { s3 = "https://d4f60d0edf9986427ad8e357eba453b6.r2.cloudflarestorage.com" }\n' > backend.hcl
          cat backend.hcl

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: github.event_name != 'pull_request'
        run: terraform apply -input=false -auto-approve tfplan
