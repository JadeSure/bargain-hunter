name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "data/strategies/guides/**"
      - "data/strategies/onboarding/**"
      - ".github/workflows/deploy-frontend.yml"
  schedule:
    # Backup refresh. GitHub heavily throttles scheduled runs, so the primary
    # freshness driver is the workflow_run trigger below (off the reliable
    # */5 bargain-hunter pipeline).
    - cron: '*/30 * * * *'
  workflow_run:
    # Redeploy after each successful deal-pipeline run so newly-hot deals reach
    # /deals without waiting for the (throttled) cron. The gate job below caps
    # this to ~one deploy per 30 min, matching the "refreshed every 30 min" copy.
    workflows: ["bargain-hunter"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - name: Decide whether to deploy
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          # Non-data-driven events (push/schedule/manual) always deploy.
          if [ "$EVENT" != "workflow_run" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Only react to successful pipeline runs on main.
          if [ "$CONCLUSION" != "success" ] || [ "$HEAD_BRANCH" != "main" ]; then
            echo "Pipeline conclusion='$CONCLUSION' branch='$HEAD_BRANCH'; skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Throttle: skip if a *real* deploy (deploy job actually ran, not
          # throttle-skipped) happened within the last ~30 min. We must inspect
          # each candidate run's deploy-job conclusion, because a throttled run
          # still concludes "success" at the run level and would otherwise reset
          # the window on every pipeline tick.
          window=1680
          now=$(date -u +%s)
          skip=false
          while read -r id created; do
            [ -z "$id" ] && continue
            cts=$(python3 -c "import datetime,sys; print(int(datetime.datetime.fromisoformat(sys.argv[1].replace('Z','+00:00')).timestamp()))" "$created" 2>/dev/null || echo 0)
            # Runs are newest-first; once past the window, no need to look further.
            [ "$cts" -gt 0 ] && [ $((now - cts)) -ge "$window" ] && break
            concl=$(gh api "repos/$REPO/actions/runs/$id/jobs" \
                      --jq 'first(.jobs[] | select(.name=="deploy") | .conclusion) // ""' \
                      2>/dev/null || echo "")
            if [ "$concl" = "success" ]; then skip=true; break; fi
          done < <(gh run list --repo "$REPO" --workflow=deploy-frontend.yml \
                     --status=completed --json databaseId,createdAt -L 30 2>/dev/null \
                   | jq -r '.[] | "\(.databaseId) \(.createdAt)"')
          if [ "$skip" = true ]; then
            echo "A real deploy occurred within ${window}s; skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_WORKER_URL: https://bargain-portal-api.jadesure17.workers.dev
      NEXT_PUBLIC_SITE_URL: https://bargain-hunter.sylvalume.online
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: |
          npx next build
          npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        run: >
          npx wrangler pages deploy .vercel/output/static
          --project-name=bargain-hunter
          --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
