name: collect-strategies

on:
  schedule:
    # Nightly, off-peak. 15:30 UTC ≈ 01:30 AEST / 02:30 AEDT (small hours in AU,
    # less Reddit contention). Non-:00 minute to dodge GitHub's top-of-hour delay.
    - cron: "30 15 * * *"
  workflow_dispatch:        # manual trigger for testing

concurrency:
  group: collect-strategies
  cancel-in-progress: false

permissions:
  contents: write           # to commit the harvested corpus + digest

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the rebase-on-push retry works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Collect strategy material
        env:
          # Optional: set these repo secrets to collect Reddit via OAuth, which
          # works from GitHub Actions IPs (the public RSS feed is 429'd there).
          # Without them the run still succeeds; Reddit subs are skipped.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python -m strategy_hunter collect

      - name: Collect onboarding material
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python -m strategy_hunter onboarding-collect

      - name: Commit corpus + digest
        if: success()
        run: |
          if [ -z "$(git status --porcelain data/strategies 2>/dev/null)" ]; then
            echo "No new strategy material."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # main moves often (the deal pipeline commits every ~2 min), so every
          # push needs a rebase-and-retry. Conflicts are resolved with -X theirs;
          # raw post files are uniquely named so they never actually conflict.
          push_with_retry() {
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $attempt."
                return 0
              fi
              echo "Push rejected (attempt $attempt); rebasing on latest main."
              if ! git pull --rebase -X theirs origin main; then
                git rebase --abort 2>/dev/null || true
              fi
            done
            return 1
          }

          # 1) Commit the whole corpus first so the working tree is clean for
          #    rebasing. Raw post files are uniquely named per post id and never
          #    conflict; the only possible conflict is today's digest, which
          #    -X theirs auto-resolves (and step 2 then rebuilds correctly).
          git add data/strategies/
          if ! git diff --cached --quiet; then
            git commit -m "chore: strategy corpus [skip ci]"
            push_with_retry || { echo "Could not push corpus." >&2; exit 1; }
          fi

          # 2) Regenerate the digest from the now fully-merged corpus and commit
          #    it. Regeneration is the conflict resolution for the per-day digest
          #    file: it always reflects every post on disk after the rebase.
          python -m strategy_hunter digest
          python -m strategy_hunter onboarding-digest
          git add data/strategies/digest/
          if ! git diff --cached --quiet; then
            git commit -m "chore: strategy digest [skip ci]"
            push_with_retry || { echo "Could not push digest." >&2; exit 1; }
          fi
