  <text x="606" y="812" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Notion</text>
  <text x="606" y="830" text-anchor="middle" fill="#8b949e" font-size="10">Subscribers DB</text>
  <text x="606" y="844" text-anchor="middle" fill="#8b949e" font-size="10">Waitlist DB</text>

