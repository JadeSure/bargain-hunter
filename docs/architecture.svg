  <rect x="376" y="872" width="100" height="32" rx="5" fill="#16102a" stroke="#c084fc" stroke-width="1"/>
  <text x="426" y="887" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="600">Resend</text>
  <text x="426" y="899" text-anchor="middle" fill="#8b949e" font-size="9">magic-link mail</text>
