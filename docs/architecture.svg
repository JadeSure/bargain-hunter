  <line x1="760" y1="265" x2="490" y2="352" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="490" y1="366" x2="760" y2="278" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
