  <text x="110" y="67" text-anchor="middle" fill="#8b949e" font-size="10">cron */5 · dispatch</text>

  <!-- cron-job.org box -->
  <rect x="210" y="30" width="160" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="290" y="51" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🌐 cron-job.org</text>
  <text x="290" y="67" text-anchor="middle" fill="#8b949e" font-size="10">5-min external fallback</text>

  <!-- arrows from triggers down -->
  <line x1="110" y1="82" x2="110" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="82" x2="290" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- merge line -->
  <line x1="110" y1="104" x2="290" y2="104" stroke="#484f58" stroke-width="1.5"/>
  <line x1="200" y1="104" x2="200" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SOURCES group ── -->
  <rect x="30" y="120" width="340" height="80" rx="7" fill="#0f1923" stroke="#30363d" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="42" y="115" fill="#484f58" font-size="10" font-weight="600" letter-spacing="0.06em">SOURCES</text>

  <!-- OzBargain -->
  <rect x="42" y="132" width="148" height="54" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="116" y="152" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">OzBargain RSS</text>
  <text x="116" y="168" text-anchor="middle" fill="#8b949e" font-size="10">votes · velocity</text>
  <text x="116" y="181" text-anchor="middle" fill="#8b949e" font-size="10">Hot + Watch</text>

  <!-- CamelCamelCamel -->
  <rect x="206" y="132" width="152" height="54" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="282" y="152" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">CamelCamelCamel AU</text>
