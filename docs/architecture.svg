  <line x1="360" y1="705" x2="384" y2="705" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="705" x2="564" y2="705" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
