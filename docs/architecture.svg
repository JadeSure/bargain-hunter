<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 640" width="940" height="640" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="940" height="640" fill="#0d1117"/>

  <!-- ── TRIGGER row ── -->
  <!-- GitHub Actions box -->
  <rect x="30" y="30" width="160" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="110" y="51" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">⏱ GitHub Actions</text>
  <text x="110" y="67" text-anchor="middle" fill="#8b949e" font-size="10">cron */5 · dispatch</text>

  <!-- cron-job.org box -->
  <rect x="210" y="30" width="160" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="290" y="51" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🌐 cron-job.org</text>
  <text x="290" y="67" text-anchor="middle" fill="#8b949e" font-size="10">5-min external fallback</text>

  <!-- arrows from triggers down -->
  <line x1="110" y1="82" x2="110" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="82" x2="290" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- merge line -->
  <line x1="110" y1="104" x2="290" y2="104" stroke="#484f58" stroke-width="1.5"/>
  <line x1="200" y1="104" x2="200" y2="118" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SOURCES group ── -->
  <rect x="30" y="120" width="340" height="80" rx="7" fill="#0f1923" stroke="#30363d" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="42" y="115" fill="#484f58" font-size="10" font-weight="600" letter-spacing="0.06em">SOURCES</text>

  <!-- OzBargain -->
  <rect x="42" y="132" width="148" height="54" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="116" y="152" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">OzBargain RSS</text>
  <text x="116" y="168" text-anchor="middle" fill="#8b949e" font-size="10">votes · velocity</text>
  <text x="116" y="181" text-anchor="middle" fill="#8b949e" font-size="10">Hot + Watch</text>

  <!-- CamelCamelCamel -->
  <rect x="206" y="132" width="152" height="54" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="282" y="152" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">CamelCamelCamel AU</text>
  <text x="282" y="168" text-anchor="middle" fill="#8b949e" font-size="10">price drops</text>
  <text x="282" y="181" text-anchor="middle" fill="#8b949e" font-size="10">discount % · Watch</text>

  <!-- arrow sources → enrich -->
  <line x1="200" y1="200" x2="200" y2="238" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- ── ENRICH + FILTER ── -->
  <rect x="60" y="240" width="280" height="54" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Enrich + filter expired</text>
  <text x="200" y="276" text-anchor="middle" fill="#8b949e" font-size="10">extract price · discount · drop expiry-past deals</text>

  <!-- arrow enrich → snapshot -->
  <line x1="200" y1="294" x2="200" y2="332" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ACTIONS CACHE (right sidebar) ── -->
  <rect x="760" y="240" width="150" height="54" rx="5" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="835" y="260" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Actions Cache</text>
  <text x="835" y="276" text-anchor="middle" fill="#6e7681" font-size="10">deals_state.json</text>
  <text x="835" y="290" text-anchor="middle" fill="#6e7681" font-size="10">alert_state.json</text>

  <!-- cache ↔ snapshot -->
  <line x1="760" y1="265" x2="490" y2="352" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <line x1="490" y1="366" x2="760" y2="278" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <text x="630" y="295" text-anchor="middle" fill="#484f58" font-size="9">restore / save</text>

  <!-- git repo (below cache) -->
  <rect x="760" y="330" width="150" height="44" rx="5" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="835" y="349" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">git repo</text>
  <text x="835" y="366" text-anchor="middle" fill="#6e7681" font-size="10">daily seed commit</text>
  <line x1="835" y1="294" x2="835" y2="330" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- ── SNAPSHOT ── -->
  <rect x="60" y="334" width="280" height="44" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="352" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Record vote snapshots</text>
  <text x="200" y="368" text-anchor="middle" fill="#8b949e" font-size="10">24 h rolling window</text>

  <!-- snapshot → score pair -->
  <line x1="140" y1="378" x2="120" y2="418" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="260" y1="378" x2="280" y2="418" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- ── HOT SCORE ── -->
  <rect x="30" y="420" width="180" height="60" rx="5" fill="#0f1f10" stroke="#3fb950" stroke-width="1"/>
  <text x="120" y="441" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">🔥 Hot Score</text>
  <text x="120" y="457" text-anchor="middle" fill="#8b949e" font-size="10">velocity × age decay</text>
  <text x="120" y="471" text-anchor="middle" fill="#8b949e" font-size="10">threshold 1.5 · min 10 votes</text>

  <!-- ── WATCH MATCH ── -->
  <rect x="230" y="420" width="180" height="60" rx="5" fill="#0a1a12" stroke="#3fb950" stroke-width="1"/>
  <text x="320" y="441" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">👀 Watch Match</text>
  <text x="320" y="457" text-anchor="middle" fill="#8b949e" font-size="10">keyword · ≥15 votes</text>
  <text x="320" y="471" text-anchor="middle" fill="#8b949e" font-size="10">age ≤ 36 h</text>

  <!-- hot + watch → gate -->
  <line x1="120" y1="480" x2="210" y2="525" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="480" x2="235" y2="525" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── QUIET HOURS GATE (diamond) ── -->
  <polygon points="220,520 280,550 220,580 160,550" fill="#1a1500" stroke="#d29922" stroke-width="1.5"/>
  <text x="220" y="547" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">Quiet hours?</text>
  <text x="220" y="562" text-anchor="middle" fill="#8b949e" font-size="9">22:00 – 07:00 AEST</text>

  <!-- gate skip label -->
  <line x1="160" y1="550" x2="60" y2="550" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="105" y="544" text-anchor="middle" fill="#6e7681" font-size="9">skip</text>

  <!-- gate → notify -->
  <line x1="280" y1="550" x2="420" y2="550" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="350" y="544" text-anchor="middle" fill="#8b949e" font-size="9">07:00 – 22:00</text>

  <!-- ── NOTIFY group ── -->
  <!-- Notion DB -->
  <rect x="420" y="470" width="148" height="54" rx="5" fill="#0a1420" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="494" y="492" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Notion</text>
  <text x="494" y="508" text-anchor="middle" fill="#8b949e" font-size="10">Subscribers</text>
  <text x="494" y="521" text-anchor="middle" fill="#8b949e" font-size="10">Sent Log</text>

  <!-- Notion → dedup -->
  <line x1="494" y1="524" x2="494" y2="558" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Dedup box -->
  <rect x="420" y="560" width="148" height="44" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="494" y="579" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Dedup</text>
  <text x="494" y="595" text-anchor="middle" fill="#8b949e" font-size="10">7-day window · daily cap</text>

  <!-- dedup → email -->
  <line x1="568" y1="582" x2="608" y2="582" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Email -->
  <rect x="610" y="560" width="140" height="44" rx="5" fill="#0a1420" stroke="#58a6ff" stroke-width="1"/>
  <text x="680" y="579" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">📧 Email Digest</text>
  <text x="680" y="595" text-anchor="middle" fill="#8b949e" font-size="10">SMTP / Gmail</text>

  <!-- email → log sent back to Notion -->
  <path d="M 680 560 Q 680 495 568 495" fill="none" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <text x="650" y="515" text-anchor="middle" fill="#6e7681" font-size="9">log sent</text>

  <!-- ── FEEDBACK group ── -->
  <!-- HMAC links label -->
  <line x1="750" y1="582" x2="790" y2="582" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="770" y="574" text-anchor="middle" fill="#c084fc" font-size="9">👍/👎</text>

  <!-- Cloudflare Worker -->
  <rect x="792" y="560" width="138" height="44" rx="5" fill="#16102a" stroke="#c084fc" stroke-width="1"/>
  <text x="861" y="579" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="600">Cloudflare Worker</text>
  <text x="861" y="595" text-anchor="middle" fill="#8b949e" font-size="10">HMAC verify · write</text>

  <!-- Worker → Feedback DB -->
  <line x1="861" y1="604" x2="861" y2="626" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <!-- Feedback DB -->
  <rect x="792" y="626" width="138" height="4" rx="2" fill="#16102a" stroke="#c084fc" stroke-width="1" stroke-dasharray="4 2"/>
  <rect x="792" y="618" width="138" height="22" rx="4" fill="#16102a" stroke="#c084fc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="861" y="634" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="600">Notion Feedback DB</text>

  <!-- Terraform -->
  <rect x="792" y="490" width="138" height="44" rx="5" fill="#16102a" stroke="#c084fc" stroke-width="1"/>
  <text x="861" y="509" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="600">Terraform CI/CD</text>
  <text x="861" y="525" text-anchor="middle" fill="#8b949e" font-size="10">push → auto-deploy</text>
  <line x1="861" y1="534" x2="861" y2="560" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr-p)"/>

  <!-- ── LEGEND ── -->
  <rect x="30" y="600" width="380" height="30" rx="4" fill="#0d1117"/>
  <circle cx="48" cy="615" r="5" fill="#58a6ff"/>
  <text x="58" y="619" fill="#6e7681" font-size="10">Scheduling / Notion</text>
  <circle cx="148" cy="615" r="5" fill="#f0883e"/>
  <text x="158" y="619" fill="#6e7681" font-size="10">Sources</text>
  <circle cx="210" cy="615" r="5" fill="#3fb950"/>
  <text x="220" y="619" fill="#6e7681" font-size="10">Scoring</text>
  <circle cx="266" cy="615" r="5" fill="#d29922"/>
  <text x="276" y="619" fill="#6e7681" font-size="10">Gate</text>
  <circle cx="310" cy="615" r="5" fill="#c084fc"/>
  <text x="320" y="619" fill="#6e7681" font-size="10">Feedback / infra</text>
</svg>
