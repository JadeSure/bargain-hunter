  <text x="835" y="349" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">git repo</text>
  <text x="835" y="366" text-anchor="middle" fill="#6e7681" font-size="10">daily seed commit</text>
  <line x1="835" y1="294" x2="835" y2="330" stroke="#484f58" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arr)"/>

